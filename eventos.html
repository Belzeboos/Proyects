<!-- ESPACIO MENU -->

<!-- ================= EVENTOS ================= -->
<section class="evjp-section">
<div class="container">

    <!-- TITULO -->
    <div class="evjp-title-box">
        <i class="bi bi-calendar-event-fill"></i>
        <h1>Eventos Escolares</h1>
    </div>

    <div class="row g-4">

        <!-- LISTA IZQUIERDA -->
        <div class="col-lg-4">
            <div class="evjp-menu">

                <button class="evjp-btn active" onclick="mostrarEvento('independencia', this)">
                    🇲🇽 Día de la Independencia
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('revolucion', this)">
                    🎖 Revolución Mexicana
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('muertos', this)">
                    💀 Día de Muertos
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('posada', this)">
                    🎄 Posada Navideña
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('olimpiadas', this)">
                    🏅 Mini Olimpiadas
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('pascua', this)">
                    🐰 Pascua
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('madre', this)">
                    💐 Día de la Madre
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('padre', this)">
                    👔 Día del Padre
                </button>

                <button class="evjp-btn" onclick="mostrarEvento('graduacion', this)">
                    🎓 Graduación
                </button>

                <!-- =====================================================
                PARA AGREGAR MÁS EVENTOS:

                <button class="evjp-btn" onclick="mostrarEvento('nombrecarpeta', this)">
                    Nuevo Evento
                </button>

                ====================================================== -->

            </div>
        </div>

        <!-- PANEL DERECHO -->
        <div class="col-lg-8">
            <div class="evjp-viewer">

                <h2 id="evjpNombre">Día de la Independencia</h2>

                <!-- CARRUSEL -->
                <div id="carouselEventos" class="carousel slide" data-bs-ride="carousel">

                    <div class="carousel-inner" id="evjpSlides">
                        <!-- JAVASCRIPT INSERTA IMAGENES -->
                    </div>

                    <button class="carousel-control-prev" type="button" data-bs-target="#carouselEventos" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button class="carousel-control-next" type="button" data-bs-target="#carouselEventos" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>

                </div>

            </div>
        </div>

    </div>

</div>
</section>
